name: face_attendance_app
description: A simple face recognition attendance app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5
  tflite_flutter: ^0.11.0
  google_mlkit_face_detection: ^0.10.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.8.0
  image: ^4.0.0
  audioplayers: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/facenet_model.tflite
    - assets/models/encodings.json
